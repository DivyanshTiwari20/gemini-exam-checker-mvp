<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Copy Checker - Gemini MVP</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
}
video, canvas {
  width:100%;
  max-width:600px;
  border-radius:10px;
}
#overlay {
  position:absolute;
  top:0;
  left:0;
}
.container {
  position:relative;
  display:inline-block;
}
button {
  margin-top:15px;
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#00ff88;
  color:black;
  font-weight:bold;
}
#result {
  margin-top:15px;
  padding:10px;
  background:#222;
  border-radius:8px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
  text-align:left;
}
</style>
</head>
<body>

<h2>AI Exam Copy Checker (Gemini MVP)</h2>

<div class="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<br>
<button onclick="scanPage()">Scan Page</button>

<div id="result">Results will appear here...</div>

<script>

// ==============================
// ADD YOUR GEMINI API KEY HERE
// ==============================
const API_KEY = "AIzaSyCywf9ach7vFA6dj3CpKaqzhvC0QUjD_M8";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Start Camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera access denied: " + err);
});

async function scanPage() {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  const imageBase64 = canvas.toDataURL("image/jpeg").split(",")[1];

  document.getElementById("result").innerText = "Analyzing...";

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [
            {
              text: "You are a teacher checking an exam copy. Find spelling, grammar, math or conceptual mistakes. Give short answer."
            },
            {
              inlineData: {
                mimeType: "image/jpeg",
                data: imageBase64
              }
            }
          ]
        }]
      })
    }
  );

  const data = await response.json();

  try {
    const text = data.candidates[0].content.parts[0].text;
    document.getElementById("result").innerText = text;
  } catch (e) {
    document.getElementById("result").innerText = "Error analyzing image";
    console.error(data);
  }

}

</script>

</body>
</html>
